services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: secure_ai
      POSTGRES_USER: secure_ai
      POSTGRES_PASSWORD: secure_ai_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secure_ai -d secure_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://secure_ai:secure_ai_password@postgres:5432/secure_ai
      JWT_SECRET: change-this-secret-before-production
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      LOG_LEVEL: INFO
      DATA_DIR: /app/data
      ENABLE_LLM_SYNTHESIS: ${ENABLE_LLM_SYNTHESIS:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
